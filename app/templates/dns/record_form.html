{% extends "base.html" %}
{% block title %}{{ action }} DNS Record{% endblock %}
{% block content %}
<h2>{{ action }} DNS Record</h2>
<form method="post" class="mt-3" style="max-width: 600px;">
  <div class="mb-3">
    <label class="form-label">Zone</label>
    <input type="text" name="zone" class="form-control" required value="{{ zone }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input type="text" name="name" class="form-control" required
           placeholder="www" value="{{ record.name if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Type</label>
    <select name="rtype" class="form-select">
      {% for t in supported_types %}
        <option value="{{ t }}" {% if record and record.type == t %}selected{% endif %}>{{ t }}</option>
      {% endfor %}
    </select>
  </div>
  {% if action == 'Edit' %}
  <div class="mb-3">
    <label class="form-label">Current Data</label>
    <input type="text" name="old_data" class="form-control" readonly
           value="{{ record.data if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">New Data</label>
    <input type="text" name="new_data" class="form-control" required
           placeholder="1.2.3.4" value="{{ record.data if record else '' }}">
  </div>
  {% else %}
  <div class="mb-3">
    <label class="form-label">Data</label>
    <input type="text" name="data" class="form-control" required
           placeholder="1.2.3.4">
  </div>
  {% endif %}
  <div class="mb-3">
    <label class="form-label">TTL</label>
    <input type="number" name="ttl" class="form-control"
           value="{{ record.ttl if record else 3600 }}">
  </div>
  <button class="btn btn-primary">{{ action }} Record</button>
  <a href="{{ url_for('dns_records', zone=zone) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
