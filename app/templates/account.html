{% extends "base.html" %}
{% block title %}Account{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-person-circle me-2"></i>Account</h4>
</div>

<div class="row">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header fw-semibold">Change Admin Password</div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" class="form-control" name="current_password" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" name="new_password" required minlength="4">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" name="confirm_password" required minlength="4">
          </div>
          <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
