{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="card shadow" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <h4 class="fw-bold">DHCP &amp; DNS Manager</h4>
        <p class="text-muted mb-0">Enter your admin password to continue</p>
      </div>
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control form-control-lg" name="password"
                  required autofocus>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
          <label class="form-check-label" for="remember_me">Remember me for 90 days</label>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">Login</button>
        </div>
      </form>
    </div>
    <div class="card-footer text-center text-muted small">
      Default password: <code>admin</code> &mdash; change it after first login
    </div>
  </div>
</div>
{% endblock %}
